<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrada | Blog do Ramon</title>
    <link rel="stylesheet" href="./CSS/styles.CSS">
</head>
<body class="pagina-entrada">
    <main class="caixa-autenticacao">
        <section class="painel-autenticacao">
            <div>
                <p class="chamada">Trabalho de Web lab</p>
                <h1>Blog do Ramon Deon</h1>
                <p class="introducao">
                    Criei este espaço para juntar alguns assuntos que fazem parte do meu dia a dia, como tecnologia,
                    jogos, séries, filmes e curiosidades sobre computadores.
                </p>
            </div>

            <form class="formulario-autenticacao" action="./pages/home.html">
                <label for="campo-email">E-mail</label>
                <input id="campo-email" type="email" name="email" placeholder="Digite seu e-mail" required>

                <label for="campo-senha">Senha</label>
                <input id="campo-senha" type="password" name="senha" placeholder="Digite sua senha" required>

                <button type="submit">Entrar</button>
                <a href="./pages/register.html">Criar uma conta</a>
            </form>
        </section>
    </main>
    <script src="./js/main.js"></script>
</body>
</html>
