<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro | Blog do Ramon</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body class="pagina-entrada">
    <main class="caixa-autenticacao">
        <section class="painel-autenticacao">
            <div>
                <p class="chamada">Novo acesso</p>
                <h1>Criar conta</h1>
                <p class="introducao">
                    Preencha os dados abaixo para entrar no Blog do Ramon Deon e acessar as páginas do trabalho.
                </p>
            </div>

            <form class="formulario-autenticacao" action="./home.html">
                <label for="campo-nome">Nome</label>
                <input id="campo-nome" type="text" name="nome" placeholder="Digite seu nome" required>

                <label for="campo-email">E-mail</label>
                <input id="campo-email" type="email" name="email" placeholder="Digite seu e-mail" required>

                <label for="campo-senha">Senha</label>
                <input id="campo-senha" type="password" name="senha" placeholder="Crie uma senha" required>

                <button type="submit">Cadastrar</button>
                <a href="../index.html">Voltar para a entrada</a>
            </form>
        </section>
    </main>
    <script src="../js/main.js"></script>
</body>
</html>
